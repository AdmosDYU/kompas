  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"4c2be094-0a6e-4afa-a184-9da17b118108\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"5248d70c-b98d-471d-a911-91de5c27e08c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"2f9ecd5a-9809-41c2-9ff2-e9a8a2447289\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* КОМПАС — Color tokens. ADMOS palette ONLY. No gradients, no shadows. */\n:root {\n  /* ---- Brand core (ADMOS palette) ---- */\n  --admos-orange: #FE5000;\n  --admos-blue:   #000F9F;\n  --admos-green:  #93D500;\n  --black:        #000000;\n  --white:        #FFFFFF;\n\n  /* ---- Neutral scale (tints of black, for UI structure) ---- */\n  --ink-900: #000000;\n  --ink-700: #1A1A1F;\n  --ink-500: #4A4A52;\n  --ink-300: #8A8A92;\n  --ink-200: #C7C7CC;\n  --ink-100: #E6E6EA;\n  --ink-050: #F4F4F6;\n\n  /* ---- Semantic roles ---- */\n  --color-primary:        var(--admos-blue);   /* primary action / core brand */\n  --color-accent:         var(--admos-orange); /* energy, CTAs, Senior */\n  --color-positive:       var(--admos-green);  /* growth, Junior, success */\n  --color-ink:            var(--ink-900);\n  --color-text:           var(--ink-900);\n  --color-text-muted:     var(--ink-500);\n  --color-text-subtle:    var(--ink-300);\n  --color-text-invert:    var(--white);\n\n  /* ---- Surfaces ---- */\n  --surface-page:   var(--white);\n  --surface-card:   var(--white);\n  --surface-muted:  var(--ink-050);\n  --surface-inset:  var(--ink-100);\n  --surface-invert: var(--black);\n\n  /* ---- Borders / lines ---- */\n  --border-hairline: var(--ink-100);\n  --border-strong:   var(--ink-900);\n  --border-grid:     var(--ink-200);\n\n  /* ---- Level accents (within palette) ---- */\n  --level-junior: var(--admos-green);\n  --level-middle: var(--admos-blue);\n  --level-senior: var(--admos-orange);\n}\n<\u002Fstyle>\n  <style>/* КОМПАС — Typography tokens. */\n:root {\n  --font-display: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; /* headings, logo */\n  --font-body:    'Manrope', 'Helvetica Neue', Arial, sans-serif;    /* body & UI */\n  --font-mono:    'IBM Plex Mono', ui-monospace, 'SF Mono', monospace; /* scores, IDs, tables */\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold:600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-extra:   800; /* @kind font */\n\n  /* Type scale (1.25 major-third-ish, tuned) */\n  --fs-display:   clamp(40px, 6vw, 76px); /* @kind font */\n  --fs-h1:        44px; /* @kind font */\n  --fs-h2:        32px; /* @kind font */\n  --fs-h3:        24px; /* @kind font */\n  --fs-h4:        20px; /* @kind font */\n  --fs-body-lg:   18px; /* @kind font */\n  --fs-body:      16px; /* @kind font */\n  --fs-body-sm:   14px; /* @kind font */\n  --fs-caption:   12px; /* @kind font */\n  --fs-overline:  12px; /* @kind font */\n\n  /* Line heights */\n  --lh-tight:   1.04; /* @kind other */\n  --lh-snug:    1.18; /* @kind other */\n  --lh-normal:  1.5; /* @kind other */\n  --lh-relaxed: 1.62; /* @kind other */\n\n  /* Letter spacing */\n  --ls-display: -0.02em; /* @kind other */\n  --ls-heading: -0.01em; /* @kind other */\n  --ls-body:    0; /* @kind other */\n  --ls-overline: 0.14em; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* КОМПАС — Spacing, radii, layout, motion tokens. */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* Radii — geometric, restrained. Mark stays circular; UI uses small radii. */\n  --radius-none: 0;\n  --radius-sm:   4px;\n  --radius-md:   8px;\n  --radius-lg:   12px;\n  --radius-pill: 999px;\n  --radius-circle: 50%;\n\n  /* Borders */\n  --bw-hair:  1px;\n  --bw-base:  2px;\n  --bw-bold:  3px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --container-text: 720px;\n  --gutter: var(--space-6);\n\n  /* Motion — calm, precise. No bounce. */\n  --ease-standard: cubic-bezier(0.2, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 320ms; /* @kind other */\n\n  /* Focus ring (accessibility) */\n  --focus-ring: 0 0 0 3px rgba(0, 15, 159, 0.35);\n}\n<\u002Fstyle>\n  <style>/* КОМПАС — Base element defaults & helper classes. */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--color-text);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-heading);\n  line-height: var(--lh-snug);\n  margin: 0;\n  color: var(--color-text);\n}\nh1 { font-size: var(--fs-h1); letter-spacing: var(--ls-display); line-height: ONLY. No gradients, no shadows. */\n:root {\n  /* ---- Brand core (ADMOS palette) ---- */\n  --admos-orange: #FE5000;\n  --admos-blue:   #000F9F;\n  --admos-green:  #93D500;\n  --black:        #000000;\n  --white:        #FFFFFF;\n\n  /* ---- Neutral scale (tints of black, for UI structure) ---- */\n  --ink-900: #000000;\n  --ink-700: #1A1A1F;\n  --ink-500: #4A4A52;\n  --ink-300: #8A8A92;\n  --ink-200: #C7C7CC;\n  --ink-100: #E6E6EA;\n  --ink-050: #F4F4F6;\n\n  /* ---- Semantic roles ---- */\n  --color-primary:        var(--admos-blue);   /* primary action / core brand */\n  --color-accent:         var(--admos-orange); /* energy, CTAs, Senior */\n  --color-positive:       var(--admos-green);  /* growth, Junior, success */\n  --color-ink:            var(--ink-900);\n  --color-text:           var(--ink-900);\n  --color-text-muted:     var(--ink-500);\n  --color-text-subtle:    var(--ink-300);\n  --color-text-invert:    var(--white);\n\n  /* ---- Surfaces ---- */\n  --surface-page:   var(--white);\n  --surface-card:   var(--white);\n  --surface-muted:  var(--ink-050);\n  --surface-inset:  var(--ink-100);\n  --surface-invert: var(--black);\n\n  /* ---- Borders / lines ---- */\n  --border-hairline: var(--ink-100);\n  --border-strong:   var(--ink-900);\n  --border-grid:     var(--ink-200);\n\n  /* ---- Level accents (within palette) ---- */\n  --level-junior: var(--admos-green);\n  --level-middle: var(--admos-blue);\n  --level-senior: var(--admos-orange);\n}\n\n/* КОМПАС — Typography tokens. */\n:root {\n  --font-display: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; /* headings, logo */\n  --font-body:    'Manrope', 'Helvetica Neue', Arial, sans-serif;    /* body & UI */\n  --font-mono:    'IBM Plex Mono', ui-monospace, 'SF Mono', monospace; /* scores, IDs, tables */\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold:600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-extra:   800; /* @kind font */\n\n  /* Type scale (1.25 major-third-ish, tuned) */\n  --fs-display:   clamp(40px, 6vw, 76px); /* @kind font */\n  --fs-h1:        44px; /* @kind font */\n  --fs-h2:        32px; /* @kind font */\n  --fs-h3:        24px; /* @kind font */\n  --fs-h4:        20px; /* @kind font */\n  --fs-body-lg:   18px; /* @kind font */\n  --fs-body:      16px; /* @kind font */\n  --fs-body-sm:   14px; /* @kind font */\n  --fs-caption:   12px; /* @kind font */\n  --fs-overline:  12px; /* @kind font */\n\n  /* Line heights */\n  --lh-tight:   1.04; /* @kind other */\n  --lh-snug:    1.18; /* @kind other */\n  --lh-normal:  1.5; /* @kind other */\n  --lh-relaxed: 1.62; /* @kind other */\n\n  /* Letter spacing */\n  --ls-display: -0.02em; /* @kind other */\n  --ls-heading: -0.01em; /* @kind other */\n  --ls-body:    0; /* @kind other */\n  --ls-overline: 0.14em; /* @kind other */\n}\n\n/* КОМПАС — Spacing, radii, layout, motion tokens. */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* Radii — geometric, restrained. Mark stays circular; UI uses small radii. */\n  --radius-none: 0;\n  --radius-sm:   4px;\n  --radius-md:   8px;\n  --radius-lg:   12px;\n  --radius-pill: 999px;\n  --radius-circle: 50%;\n\n  /* Borders */\n  --bw-hair:  1px;\n  --bw-base:  2px;\n  --bw-bold:  3px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --container-text: 720px;\n  --gutter: var(--space-6);\n\n  /* Motion — calm, precise. No bounce. */\n  --ease-standard: cubic-bezier(0.2, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 320ms; /* @kind other */\n\n  /* Focus ring (accessibility) */\n  --focus-ring: 0 0 0 3px rgba(0, 15, 159, 0.35);\n}\n\n/* КОМПАС — Base element defaults & helper classes. */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--color-text);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-heading);\n  line-height: var(--lh-snug);\n  margin: 0;\n  color: var(--color-text);\n}\nh1 { font-size: var(--fs-h1); letter-spacing: var(--ls-display); line-height: var(--lh-tight); }\nh2 { font-size: var(--fs-h2); }\nh3 { font-size: var(--fs-h3); }\nh4 { font-size: var(--fs-h4); }\n\np { margin: 0 0 1em; text-wrap: pretty; }\na { color: var(--color-primary); text-decoration: none; }\na:hover { text-decoration: underline; }\n\n/* Utility text roles */\n.km-overline {\n  font-family: var(--font-body);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-overline);\n  letter-spacing: var(--ls-overline);\n  text-transform: uppercase;\n  color: var(--color-text-muted);\n}\n.km-mono { font-family: var(--font-mono); font-feature-settings: \"tnum\" 1; }\n.km-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-extra);\n  font-size: var(--fs-display);\n  letter-spacing: var(--ls-display);\n  line-height: var(--lh-tight);\n}\n\n/* Tabular figures for any data/numeric context */\n.km-tnum { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1; }\n\n<\u002Fstyle>\n  <script src=\"5e34cc3a-6ff2-4714-af8b-53e5b72cfb54\"><\u002Fscript>\n  <style>\n    html { scroll-behavior: smooth; }\n    body { background: #fff; }\n    .km-link { color: var(--ink-700); font-family: var(--font-body); font-weight: 600; font-size: 14px; letter-spacing: .01em; text-decoration: none; padding: 6px 0; border-bottom: 2px sol r;justify-content:space-between\">\n            <span style=\"font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--admos-blue);background:#fff;border-radius:999px;padding:6px 14px;white-space:nowrap\">Руководителям агентств<\u002Fspan>\n            <img src=\"fe363a4c-71e4-468b-b78d-87646189d7d5\" alt=\"\" style=\"width:32px;height:32px\">\n          <\u002Fdiv>\n          <div style=\"position:relative;margin-top:auto\">\n            <div style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(36px,4.4vw,50px);line-height:1.02;letter-spacing:-.025em;color:#fff;margin:0 0 14px\">Проверьте уровень своей команды<\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.5;color:rgba(255,255,255,.82);margin:0 0 22px;max-width:360px;font-size:17px\">Объективная оценка команды и кандидатов — меньше ошибок найма.<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"display:flex;gap:6px\">\n                <span style=\"width:12px;height:12px;border-radius:50%;background:var(--admos-green)\"><\u002Fspan>\n                <span style=\"width:12px;height:12px;border-radius:50%;background:#fff\"><\u002Fspan>\n                <span style=\"width:12px;height:12px;border-radius:50%;background:var(--admos-orange)\"><\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:13px;font-weight:600;color:rgba(255,255,255,.86)\">Грейд по каждому сотруднику<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Pager dots -->\n        <div style=\"position:absolute;bottom:18px;left:34px;display:flex;gap:7px;z-index:2\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#fff;animation:kompasDot 6s linear infinite\"><\u002Fspan>\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#fff;animation:kompasDot 6s linear infinite;animation-delay:-3s\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--ink-100);border:1px solid var(--ink-100);border-radius:12px;overflow:hidden;margin-top:64px;max-width:840px\">\n        <div style=\"background:#fff;padding:22px 24px\">\n          <div style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--admos-blue);letter-spacing:-.02em\">3<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--ink-500);margin-top:4px\">грейда: Junior → Senior<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;padding:22px 24px\">\n          <div style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--admos-blue);letter-spacing:-.02em\">9<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--ink-500);margin-top:4px\">разделов ядра компетенций<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;padding:22px 24px\">\n          <div style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--admos-blue);letter-spacing:-.02em\">MST<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--ink-500);margin-top:4px\">адаптивная двухмодульная логика<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;padding:22px 24px\">\n          <div style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--admos-blue);letter-spacing:-.02em\">5<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--ink-500);margin-top:4px\">уровней сложности вопросов<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 2. ПРОБЛЕМА ============ -->\n  <section id=\"problem\" style=\"scroll-margin-top:72px;padding:96px 24px;background:var(--ink-050)\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"max-width:760px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:16px\">Проблема отрасли<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:var(--ink-900);margin:0 0 20px\">Стаж ≠ компетенция<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.55;color:var(--ink-500);margin:0\">В digital и performance грейды Junior / Middle / Senior формализованы и измеримы. В промоиндустрии отраслевого стандарта знаний нет — уровень оценивают на глаз, по стажу и самопрезентации.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:20px\">\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-top:4px solid var(--ink-300);border-radius:12px;padding:28px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px\">\n            <span style=\"font-family:var(--font-mono);font-weight:600;font-size:34px;color:var(--ink-900);line-height:1\">15<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;color:var(--ink-500)\">лет в отрасли<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.55;color:var(--ink-700);margin:0\">Узкий профиль — только техники нанесения. Субъективно считается экспертом.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-top:4px solid var(--admos-green);border-radius:12px;padding:28px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px\">\n            <span style=\"font-family:var(--font-mono);font-weight:600;font-size:34px;color:var(--ink-900);line-height:1\">2–3<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;color:var(--ink-500)\">года в крупной компании<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.55;color:var(--ink-700);margin:0\">Системный профиль: расчёты, тендеры, логистика, поставщики. <strong style=\"color:var(--ink-900)\">Объективно сильнее.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--ink-900);border-radius:12px;padding:36px 40px;display:flex;flex-wrap:wrap;gap:28px;align-items:flex-start\">\n        <div style=\"flex:1;min-width:260px\">\n          <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--admos-orange);margin-bottom:12px\">Взгляд работодателя<\u002Fdiv>\n          <p style=\"font-size:19px;line-height:1.45;color:#fff;font-weight:600;margin:0\">Работодатель оценивает вслепую. Нет инструмента понять, насколько команда соответствует уровню отрасли.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:260px;border-left:1px solid rgba(255,255,255,.16);padding-left:28px\">\n          <p style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,.78);margin:0 0 12px\">Кандидат красиво продаёт себя на собеседовании — подтвердить реальные знания нечем.<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,.78);margin:0\">Цена слабых команд и ошибок найма — деньги, сорванные проекты и репутация.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3. МЕТОДИКА ============ -->\n  <section id=\"method\" style=\"scroll-margin-top:72px;padding:96px 24px;background:#fff\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"max-width:760px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:16px\">Методика<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:var(--admos-blue);margin:0 0 20px\">КОМПАС: адаптивный отраслевой экзамен<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.55;color:var(--ink-500);margin:0\">В основе — Digital SAT, международный цифровой адаптивный формат. КОМПАС переносит проверенную механику в промоиндустрию.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:20px\">\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink-300);margin-bottom:14px\">01<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink-900);margin:0 0 10px\">Модель Digital SAT<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Двухмодульная адаптивная логика (MST): второй модуль подстраивается под результат первого.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink-300);margin-bottom:14px\">02<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink-900);margin:0 0 10px\">Только хард-скиллы<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Измеряются знаниевые компетенции. Софт-скиллы оцениваются отдельно — вне этого теста.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink-300);margin-bottom:14px\">03<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink-900);margin:0 0 14px\">Грейдовая шкала<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0 0 16px\">Результат — грейд Junior → Senior. Уровни сложности вопросов 1–5.<\u002Fp>\n          <x-import component-from-global-scope=\"DesignSystem_9f8215.LevelTrack\" current=\"middle\" hint-size=\"100%,40px\"><\u002Fx-import>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink-300);margin-bottom:14px\">04<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink-900);margin:0 0 10px\">9 разделов ядра<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Единая отраслевая таксономия промоиндустрии — общий язык компетенций.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;background:var(--ink-100);border:1px solid var(--ink-100);border-radius:12px;overflow:hidden\">\n        <div style=\"background:var(--ink-050);padding:24px 26px\">\n          <h4 style=\"font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink-900);margin:0 0 8px\">Адаптивная маршрутизация (MST)<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.5;color:var(--ink-500);margin:0\">Точнее измерение за меньшее число вопросов.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--ink-050);padding:24px 26px\">\n          <h4 style=\"font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink-900);margin:0 0 8px\">Дифференцированный подсчёт<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.5;color:var(--ink-500);margin:0\">Вес ответа зависит от сложности вопроса.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--ink-050);padding:24px 26px\">\n          <h4 style=\"font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink-900);margin:0 0 8px\">Сравнение с отраслью<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.5;color:var(--ink-500);margin:0\">Перцентиль относительно когорты прошедших аттестацию. Активируется после набора статистически значимой когорты.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 4. ПЛАТФОРМА ============ -->\n  <section id=\"platform\" style=\"scroll-margin-top:72px;padding:96px 24px;background:var(--ink-050)\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"max-width:760px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:16px\">Платформа и личный кабинет<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:var(--ink-900);margin:0\">Два контура: тренировка и сертификация<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:24px\">\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-top:4px solid var(--admos-green);border-radius:12px;padding:32px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px\">\n            <span style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--admos-green);border:2px solid var(--admos-green);border-radius:4px;padding:3px 8px\">Онлайн<\u002Fspan>\n            <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--ink-900);margin:0\">Тренировочный контур<\u002Fh3>\n          <\u002Fdiv>\n          <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px\">\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-green);font-weight:700\">—<\u002Fspan>Личный кабинет каждого зарегистрированного<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-green);font-weight:700\">—<\u002Fspan>Несколько попыток прохождения<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-green);font-weight:700\">—<\u002Fspan>Разбор и объяснения ответов<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-green);font-weight:700\">—<\u002Fspan>Прогресс по разделам и динамика грейда<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-top:4px solid var(--admos-blue);border-radius:12px;padding:32px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px\">\n            <span style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--admos-blue);border:2px solid var(--admos-blue);border-radius:4px;padding:3px 8px\">Офлайн<\u002Fspan>\n            <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--ink-900);margin:0\">Сертифицирующий контур<\u002Fh3>\n          <\u002Fdiv>\n          <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px\">\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-blue);font-weight:700\">—<\u002Fspan>Прохождение с наблюдателями (прокторинг)<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-blue);font-weight:700\">—<\u002Fspan>Разбор и правильные ответы закрыты<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:15px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-blue);font-weight:700\">—<\u002Fspan>Официальный результат → сертификат КОМПАС<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:22px 28px;display:flex;align-items:center;gap:16px\">\n        <img src=\"5c0bd729-15df-48a2-a142-600a8852473d\" alt=\"\" style=\"width:34px;height:34px;flex-shrink:0\">\n        <p style=\"font-size:15px;line-height:1.5;color:var(--ink-700);margin:0\">Личный кабинет — рабочее пространство специалиста для подготовки между официальными аттестациями.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 5. ТАРИФЫ ============ -->\n  <section id=\"tariffs\" style=\"scroll-margin-top:72px;padding:96px 24px;background:#fff\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"max-width:760px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:16px\">Доступ и тарифы<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:var(--ink-900);margin:0\">Доступ к платформе<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:20px\">\n        <!-- Free -->\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:32px;display:flex;flex-direction:column\">\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--ink-900);margin:0 0 6px\">Бесплатно<\u002Fh3>\n          <div style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--ink-900);margin:8px 0 20px\">0 ₽<\u002Fdiv>\n          <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;flex:1\">\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-green);font-weight:700\">—<\u002Fspan>Доступ к платформе тренировочных тестов и занятий<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-green);font-weight:700\">—<\u002Fspan>Без ограничений по попыткам в тренировочном режиме<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <!-- Premium -->\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-top:4px solid var(--admos-blue);border-radius:12px;padding:32px;display:flex;flex-direction:column\">\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--ink-900);margin:0 0 6px\">Премиум<\u002Fh3>\n          <div style=\"display:flex;align-items:baseline;gap:8px;margin:8px 0 20px\">\n            <span style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--admos-blue)\">19 999 ₽<\u002Fspan>\n          <\u002Fdiv>\n          <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;flex:1\">\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-blue);font-weight:700\">—<\u002Fspan>Обучение по ошибкам: разбор каждого неверного ответа в тренировочных вопросах<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:var(--ink-700)\"><span style=\"color:var(--admos-blue);font-weight:700\">—<\u002Fspan>Индивидуальный план развития (ИПР) с рекомендациями по обучению<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <!-- Offline -->\n        <div style=\"background:var(--ink-900);border:1px solid var(--ink-900);border-top:4px solid var(--admos-orange);border-radius:12px;padding:32px;display:flex;flex-direction:column\">\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:20px;color:#fff;margin:0 0 6px\">Офлайн-аттестация<\u002Fh3>\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin:8px 0 20px\">\n            <span style=\"font-family:var(--font-mono);font-weight:600;font-size:30px;color:#fff\">9 999 ₽<\u002Fspan>\n            <span style=\"font-size:13px;color:rgba(255,255,255,.6)\">за участие<\u002Fspan>\n          <\u002Fdiv>\n          <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;flex:1\">\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.82)\"><span style=\"color:var(--admos-orange);font-weight:700\">—<\u002Fspan>Официальная аттестация с прокторингом и выдачей сертификата КОМПАС<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.82)\"><span style=\"color:var(--admos-orange);font-weight:700\">—<\u002Fspan>Проводится раз в квартал. Официальную аттестацию можно пройти не более 2 раз в течение года<\u002Fli>\n            <li style=\"display:flex;gap:10px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.82)\"><span style=\"color:var(--admos-orange);font-weight:700\">—<\u002Fspan>Для членов АКАР — скидка 10% (8 999 ₽)<\u002Fli>\n          <\u002Ful>\n          <a href=\"#attestation\" style=\"text-decoration:none;margin-top:22px\">\n            <x-import component-from-global-scope=\"DesignSystem_9f8215.Button\" variant=\"accent\" size=\"md\" full=\"{{ true }}\" hint-size=\"100%,44px\">Записаться на ближайшую дату<\u002Fx-import>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 6. ВЫГОДА ДЛЯ ВСЕХ ============ -->\n  <section id=\"benefits\" style=\"scroll-margin-top:72px;padding:96px 24px;background:var(--ink-050)\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"max-width:760px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:16px\">Выгода для всех сторон<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:var(--admos-blue);margin:0\">Каждая сторона выигрывает<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px\">\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--admos-blue);margin-bottom:14px\">01<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ink-900);margin:0 0 10px\">Специалисты<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Карьерный лифт, подтверждённый грейд, доступ к работодателям, где сертификат обязателен.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--admos-blue);margin-bottom:14px\">02<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ink-900);margin:0 0 10px\">Агентства-работодатели<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Объективная оценка команды и кандидатов, меньше ошибок найма.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--admos-blue);margin-bottom:14px\">03<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ink-900);margin:0 0 10px\">Клиенты (бренды)<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Свои специалисты по мерчу проходят ту же аттестацию. При найме клиенты проверяют сертификат и балл КОМПАС.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--admos-blue);margin-bottom:14px\">04<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ink-900);margin:0 0 10px\">Поставщики<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Общий язык компетенций в работе с агентствами-партнёрами.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--ink-100);border-radius:12px;padding:26px\">\n          <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--admos-blue);margin-bottom:14px\">05<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ink-900);margin:0 0 10px\">Отрасль и регулятор<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:var(--ink-500);margin:0\">Отраслевой стандарт квалификации — общий бенчмарк рынка.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 7. АНОНС ОФЛАЙН-АТТЕСТАЦИИ ============ -->\n  <section id=\"attestation\" style=\"position:relative;scroll-margin-top:72px;padding:96px 24px;background:{{ announceColor }};overflow:hidden\">\n    <sc-if value=\"{{ showWatermark }}\" hint-placeholder-val=\"{{ true }}\">\n      <img src=\"fe363a4c-71e4-468b-b78d-87646189d7d5\" alt=\"\" style=\"position:absolute;bottom:-120px;left:-80px;width:420px;height:420px;opacity:.06;pointer-events:none\">\n    <\u002Fsc-if>\n    <div style=\"position:relative;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:48px;align-items:start\">\n      <div>\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--admos-orange);margin-bottom:16px\">Анонс офлайн-аттестации<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:#fff;margin:0 0 28px\">Ближайшая официальная аттестация<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:0;border-top:1px solid rgba(255,255,255,.16)\">\n          <div style=\"display:flex;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.16)\"><span style=\"font-size:14px;color:rgba(255,255,255,.62)\">Формат<\u002Fspan><span style=\"font-size:15px;font-weight:600;color:#fff;text-align:right\">Офлайн с прокторингом<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.16)\"><span style=\"font-size:14px;color:rgba(255,255,255,.62)\">Периодичность<\u002Fspan><span style=\"font-size:15px;font-weight:600;color:#fff;text-align:right\">Раз в квартал<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.16)\"><span style=\"font-size:14px;color:rgba(255,255,255,.62)\">Результат<\u002Fspan><span style=\"font-size:15px;font-weight:600;color:#fff;text-align:right\">Сертификат КОМПАС: грейд и освоение по разделам<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.16)\"><span style=\"font-size:14px;color:rgba(255,255,255,.62)\">Стоимость<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:15px;font-weight:600;color:#fff;text-align:right\">9 999 ₽ · для членов АКАР −10%<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.16)\"><span style=\"font-size:14px;color:rgba(255,255,255,.62)\">Повторные попытки<\u002Fspan><span style=\"font-size:15px;font-weight:600;color:#fff;text-align:right\">Не более 2 раз в течение года<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex;align-items:center;gap:10px;margin-top:24px;padding:10px 16px;border:1px solid rgba(255,255,255,.24);border-radius:8px\">\n          <span style=\"font-family:var(--font-mono);font-size:14px;color:#fff\">Дата: [уточняется]<\u002Fspan>\n          <span style=\"color:rgba(255,255,255,.4)\">·<\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:14px;color:#fff\">Город: [уточняется]<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Form -->\n      <div style=\"background:#fff;border-radius:12px;padding:32px\">\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:14px;padding:20px 0\">\n            <img src=\"5c0bd729-15df-48a2-a142-600a8852473d\" alt=\"\" style=\"width:44px;height:44px\">\n            <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--ink-900);margin:0\">Заявка отправлена<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.55;color:var(--ink-500);margin:0\">Это демонстрационный макет — данные не передаются. Мы свяжемся с вами по ближайшей дате аттестации.<\u002Fp>\n            <button onclick=\"{{ onReset }}\" style=\"background:none;border:none;padding:0;margin-top:4px;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--admos-blue);cursor:pointer\">Отправить ещё одну<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"display:flex;flex-direction:column;gap:16px\">\n            <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--ink-900);margin:0 0 4px\">Оставить заявку на участие<\u002Fh3>\n            <x-import component-from-global-scope=\"DesignSystem_9f8215.Input\" label=\"Имя\" placeholder=\"Иван Петров\" hint-size=\"100%,72px\"><\u002Fx-import>\n            <x-import component-from-global-scope=\"DesignSystem_9f8215.Input\" label=\"Компания\" placeholder=\"Название агентства\" hint-size=\"100%,72px\"><\u002Fx-import>\n            <x-import component-from-global-scope=\"DesignSystem_9f8215.Input\" label=\"Email\" type=\"email\" placeholder=\"name@company.ru\" hint-size=\"100%,72px\"><\u002Fx-import>\n            <x-import component-from-global-scope=\"DesignSystem_9f8215.Button\" variant=\"accent\" size=\"lg\" full=\"{{ true }}\" type=\"submit\" hint-size=\"100%,54px\">Оставить заявку на участие<\u002Fx-import>\n            <p style=\"font-size:12px;color:var(--ink-300);margin:0\">Демонстрационный макет — форма не отправляет данные.<\u002Fp>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 8. ОБРАЗЕЦ РЕЗУЛЬТАТА ============ -->\n  <section id=\"result\" style=\"scroll-margin-top:72px;padding:96px 24px;background:#fff\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"max-width:760px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:16px\">Образец результата<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4vw,46px);line-height:1.06;letter-spacing:-.02em;color:var(--ink-900);margin:0\">Как выглядит результат<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--ink-100);border-radius:12px;overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:var(--ink-100)\">\n          <div style=\"background:#fff;padding:36px 36px;display:flex;flex-direction:column;justify-content:center;gap:22px\">\n            <div style=\"display:flex;align-items:center;gap:13px\">\n              <img src=\"5c0bd729-15df-48a2-a142-600a8852473d\" alt=\"\" style=\"width:84px;height:84px\">\n              <span style=\"font-family:var(--font-display);font-weight:800;font-size:44px;letter-spacing:.04em;color:var(--ink-900)\">КОМПАС<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid var(--ink-100);padding-top:18px\">\n              <div style=\"font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-300);margin-bottom:6px\">Специалист<\u002Fdiv>\n              <div style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink-900);line-height:1.2\">Иванов Иван Иванович<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:13px;color:var(--ink-500);margin-top:6px\">Дата аттестации: 31.12.2025<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-300);margin-bottom:12px\">Грейд<\u002Fdiv>\n              <x-import component-from-global-scope=\"DesignSystem_9f8215.LevelBadge\" level=\"middle\" size=\"lg\" hint-size=\"150px,44px\"><\u002Fx-import>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid var(--ink-100);padding-top:20px\">\n              <div style=\"display:flex;align-items:baseline;gap:12px\">\n                <span style=\"font-family:var(--font-mono);font-weight:600;font-size:64px;color:var(--admos-blue);line-height:1\">72<\u002Fspan>\n                <span style=\"font-size:17px;font-weight:600;color:var(--ink-700)\">перцентиль по отрасли<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:15px;line-height:1.55;color:var(--ink-500);margin:12px 0 0\">Результат выше, чем у 72% прошедших. Сравнение с отраслью активируется после набора статистически значимой когорты.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;padding:32px 36px\">\n            <div style=\"font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px\">Освоение по разделам<\u002Fdiv>\n            <x-import component-from-global-scope=\"DesignSystem_9f8215.CompetencyTable\" rows=\"{{ rows }}\" hint-size=\"100%,520px\"><\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--ink-050);padding:14px 36px;border-top:1px solid var(--ink-100)\">\n          <p style=\"font-size:12px;color:var(--ink-300);margin:0\">Образец. Данные условные. Шкала и оформление — в проработке.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 9. ФИНАЛЬНЫЙ CTA ============ -->\n  <section id=\"cta\" style=\"position:relative;scroll-margin-top:72px;padding:104px 24px;background:{{ finalColor }};overflow:hidden\">\n    <sc-if value=\"{{ showWatermark }}\" hint-placeholder-val=\"{{ true }}\">\n      <img src=\"fe363a4c-71e4-468b-b78d-87646189d7d5\" alt=\"\" style=\"position:absolute;top:50%;right:-60px;transform:translateY(-50%);width:380px;height:380px;opacity:.05;pointer-events:none\">\n    <\u002Fsc-if>\n    <div style=\"position:relative;max-width:760px;margin:0 auto;text-align:center\">\n      <h2 style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(32px,4.6vw,52px);line-height:1.05;letter-spacing:-.02em;color:#fff;margin:0 0 36px\">Подтвердите свой Грейд в отрасли<\u002Fh2>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center\">\n        <a href=\"#hero\" style=\"text-decoration:none\">\n          <x-import component-from-global-scope=\"DesignSystem_9f8215.Button\" variant=\"accent\" size=\"lg\" hint-size=\"auto,54px\">Начать бесплатную тренировку<\u002Fx-import>\n        <\u002Fa>\n        <a href=\"#attestation\" style=\"text-decoration:none\">\n          <button style=\"display:inline-flex;align-items:center;justify-content:center;height:54px;padding:15px 28px;font-family:var(--font-body);font-weight:700;font-size:17px;letter-spacing:.01em;color:#fff;background:transparent;border:2px solid rgba(255,255,255,.5);border-radius:8px;cursor:pointer\">Записаться на офлайн-аттестацию<\u002Fbutton>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10. ФУТЕР ============ -->\n  <footer style=\"background:var(--admos-blue);padding:64px 24px 40px\">\n    <div style=\"max-width:1200px;margin:0 auto\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.14)\">\n        <div style=\"max-width:320px\">\n          <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px\">\n            <img src=\"fe363a4c-71e4-468b-b78d-87646189d7d5\" alt=\"\" style=\"width:30px;height:30px\">\n            <span style=\"font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:.04em;color:#fff\">КОМПАС<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;color:rgba(255,255,255,.55);margin:0\">Отраслевой стандарт квалификации специалистов корпоративного мерча.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:16px\">Разделы<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <a href=\"#method\" class=\"km-foot\">Методика<\u002Fa>\n            <a href=\"#platform\" class=\"km-foot\">Платформа<\u002Fa>\n            <a href=\"#tariffs\" class=\"km-foot\">Тарифы<\u002Fa>\n            <a href=\"#benefits\" class=\"km-foot\">Выгода<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:16px\">Аттестация<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <a href=\"#attestation\" class=\"km-foot\">Офлайн-аттестация<\u002Fa>\n            <a href=\"#result\" class=\"km-foot\">Образец результата<\u002Fa>\n            <a href=\"#cta\" class=\"km-foot\">Начать тренировку<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:16px\">Контакты<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <span style=\"font-size:14px;color:rgba(255,255,255,.55)\">[email — уточняется]<\u002Fspan>\n            <span style=\"font-size:14px;color:rgba(255,255,255,.55)\">[телефон — уточняется]<\u002Fspan>\n            <span style=\"font-size:14px;color:rgba(255,255,255,.55)\">[город — уточняется]<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;padding-top:24px\">\n        <span style=\"font-size:13px;color:rgba(255,255,255,.4)\">© 2026 КОМПАС · Комплексная Оценка Мерч-Профессионала<\u002Fspan>\n        <span style=\"font-size:13px;color:rgba(255,255,255,.4)\">Демонстрационный макет. Формы не отправляют данные.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;announceBg&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;blue&quot;, &quot;black&quot;], &quot;default&quot;: &quot;blue&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Темы секций&quot; },\n  &quot;finalCtaBg&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;blue&quot;, &quot;black&quot;], &quot;default&quot;: &quot;blue&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Темы секций&quot; },\n  &quot;showWatermark&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Декор&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { submitted: false, menuOpen: false };\n\n  renderVals() {\n    const p = this.props || {};\n    const announceColor = (p.announceBg ?? 'blue') === 'black' ? '#000000' : '#000F9F';\n    const finalColor = (p.finalCtaBg ?? 'blue') === 'black' ? '#000000' : '#000F9F';\n    const showWatermark = p.showWatermark ?? true;\n\n    const rows = [\n      { name: 'Продукт и технологии нанесения', score: 82 },\n      { name: 'Расчёты и фин. грамотность', score: 58 },\n      { name: 'Закупки и работа с поставщиками', score: 80 },\n      { name: 'Производство и упр. заказом', score: 62 },\n      { name: 'Тендеры и госзакупки', score: 38 },\n      { name: 'Юридические и фин. основы', score: 55 },\n      { name: 'Логистика и доставка', score: 60 },\n      { name: 'Продажи и переговоры', score: 78 },\n      { name: 'Enterprise-клиенты и дизайн', score: 34 },\n    ];\n\n    return {\n      rows,\n      announceColor,\n      finalColor,\n      showWatermark,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      menuOpen: this.state.menuOpen,\n      menuClosed: !this.state.menuOpen,\n      menuClass: this.state.menuOpen ? 'open' : '',\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      onSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); },\n      onReset: () => this.setState({ submitted: false }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
